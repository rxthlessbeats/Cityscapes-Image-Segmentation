# Training hyperparameters (loaded by TrainConfig)
model_name: fcn8s         # registered model name (see model.py MODEL_REGISTRY)
base_ch: 16               # encoder width for fcn8s, unet, deeplabv3plus
img_height: 256
img_width: 512
batch_size: 8
num_classes: 8
num_epochs: 50
lr: 1e-3
weight_decay: 0.001
num_train: 1000
num_val: 250
seed: 42
loss_type: focal  # or "focal"
focal_gamma: 2.0
use_amp: true              # mixed-precision training (float16 on CUDA)
augment_train: false        # false to use val_transform on train set (no augmentation)
use_class_weights: false   # false to disable inverse-frequency class weighting
lr_scheduler: plateau       # "none" or "plateau" (ReduceLROnPlateau on val loss)
plateau_patience: 3
plateau_factor: 0.5
plateau_min_lr: 1e-5
load_best_checkpoint: true   # restore lowest-val-loss weights before eval / TensorBoard
early_stopping_patience: 8    # 0 = train for full num_epochs; else stop if val loss does not improve this many times in a row

# Train subset + crop: prefer remapped classes (e.g. human + traffic). null or [] = uniform subset + single RRC.
prefer_train_images_with_classes: [] # [2, 4]
prefer_train_min_rare_fraction: 0.05   # eligible if fraction of prefer-class pixels > this; 0 = any pixel
rare_crop_num_samples: 10               # best-of-N train crops when prefer list is non-empty
